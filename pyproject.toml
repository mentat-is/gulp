[project.scripts]
gulp = "gulp.__main__:main"

[tool.setuptools]
include-package-data = true
license-files = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"

# Ensure pytest loads the asyncio plugin when available
addopts = "-p pytest_asyncio"
asyncio_mode = "auto"
minversion = "7.0"

# Match SDK pytest markers to avoid marker warnings
markers = [
	"integration: Integration tests (requires live Gulp server)",
	"e2e: End-to-end tests",
	"stress: Stress tests (long-running, resource-intensive tests with ingestion/query)",
]
