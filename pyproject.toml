    "json5",
    "libpff-python",
    "llvmlite",
    "lxml",
    "MarkupSafe",
    "msoffcrypto-tool",
    "multidict",
    "muty-python",
    "ntplib",
    "numba",
    "numpy",
    "odfpy",
    "olefile",
    "oletools",
    "opensearch-py",
    "orjson",
    "packaging",
    "pandas",
    "pcodedmp",
    "pillow",
    "pluggy",
    "prettytable",
    "prometheus-client",
    "prometheus-fastapi-instrumentator",
    "propcache",
    "psutil",
