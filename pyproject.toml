[build-system]
requires = ["setuptools>=68.0", "wheel", "setuptools_scm[toml]>=7.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
write_to = "src/gulp/_version.py"
version_scheme = "guess-next-dev"
local_scheme = "no-local-version"


[project]
name = "mentat-gulp"
dynamic= ["version"]
authors = [{ name = "Mentat", email = "info@mentat.is" }]
description = "gULP - (generic) Unified Log Processor."
readme = "README.md"
license = {text = "AGPL-3.0 and GULP (see LICENSE.md file)"}
# some dependencies have not yet updated for python 3.14, so we need to limit the supported versions for now
requires-python = ">=3.12"
dependencies = [
    "aiobotocore",
    "aiofile",
    "aiofiles",
    "aiohappyeyeballs",
    "aiohttp",
    "aioitertools",
    "aiomultiprocess",
    "aioshutil",
    "aiosignal",
    "aiosmtplib",
    "annotated-types",
    "anyio",
    "art",
    "async-unzip",
    "asyncio-atexit",
    "asyncio-pool",
    "attrs",
    "Authlib",
    "botocore",
    "caio",
    "certifi",
    "cffi",
    "charset-normalizer",
    "click",
    "colorama",
    "colorclass",
    "coloredlogs",
    "construct",
    "cryptography",
    "defusedxml",
    "deprecation",
    "distro",
    "dnspython",
    "docx2txt",
    "dotwiz",
    "easygui",
    "elastic-transport",
    "elasticsearch",
    "elementpath",
    "Events",
    "evtx",
    "fastapi",
    "frozenlist",
    "gitdb",
    "gulp-sdk",
    "GitPython",
    "greenlet",
    "h11",
    "httpcore",
